<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Connexion - NX.Money</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  
  <style>
    /* Mêmes styles que register.html */
    :root {
      --primary: #00ffcc;
      --primary-dark: #00cca3;
      --secondary: #ff4d94;
      --accent: #9d4edd;
      --bg-dark: #000000;
      --bg-medium: #050505;
      --bg-light: #0d0d0d;
      --text-light: #ffffff;
      --text-dim: #6b7a8d;
      --card-bg: rgba(6, 6, 6, 0.97);
      --card-border: rgba(255, 255, 255, 0.04);
      --success: #4cff4c;
      --warning: #ffcc00;
      --danger: #ff4757;
      --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.95);
      --shadow-glow: 0 0 30px rgba(0, 255, 204, 0.12);
      --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1);
      --glass-bg: rgba(255, 255, 255, 0.012);
      --glass-border: rgba(255, 255, 255, 0.025);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #000000;
      color: var(--text-light);
      position: relative;
      font-size: 14px;
      line-height: 1.5;
      display: flex;
      flex-direction: column;
    }

    .gradient-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      background: radial-gradient(circle at 20% 30%, rgba(0, 255, 204, 0.04) 0%, transparent 40%),
                  radial-gradient(circle at 80% 70%, rgba(157, 78, 221, 0.04) 0%, transparent 40%),
                  radial-gradient(circle at 40% 80%, rgba(255, 77, 148, 0.03) 0%, transparent 40%),
                  #000000;
    }

    .noise {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      opacity: 0.07;
      background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMDAiIGhlaWdodD0iMzAwIj48ZmlsdGVyIGlkPSJmIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iLjc0IiBudW1PY3RhdmVzPSIzIiAvPjwvZmlsdGVyPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbHRlcj0idXJsKCNmKSIgb3BhY2l0eT0iMC4xIiAvPjwvc3ZnPg==');
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 5%;
      background: rgba(0, 0, 0, 0.97);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: black;
      transform: rotate(45deg);
      transition: var(--transition);
    }

    .logo-icon i {
      transform: rotate(-45deg);
    }

    .logo-text {
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--text-light), var(--primary));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
    }

    .back-btn {
      width: 40px;
      height: 40px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-light);
      font-size: 18px;
      cursor: pointer;
      transition: var(--transition);
      text-decoration: none;
    }

    .back-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .container {
      max-width: 500px;
      margin: 0 auto;
      padding: 20px 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .auth-card {
      background: rgba(5, 5, 5, 0.98);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 24px;
      padding: 30px 20px;
      margin: 20px 0;
      position: relative;
      overflow: hidden;
      box-shadow: 0 8px 50px rgba(0, 0, 0, 0.85);
    }

    .auth-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0, 255, 204, 0.4), rgba(157, 78, 221, 0.4), transparent);
    }

    .auth-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 10px;
      text-align: center;
    }

    .auth-title span {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .auth-subtitle {
      color: var(--text-dim);
      text-align: center;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 8px;
      color: var(--text-dim);
    }

    .form-input {
      width: 100%;
      padding: 16px;
      background: rgba(0, 0, 0, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      color: var(--text-light);
      font-size: 15px;
      transition: var(--transition);
      font-family: 'Inter', sans-serif;
    }

    .form-input:focus {
      outline: none;
      border-color: rgba(0, 255, 204, 0.5);
      box-shadow: 0 0 0 3px rgba(0, 255, 204, 0.07);
      background: rgba(0, 0, 0, 0.85);
    }

    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 15px 0;
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 5px;
      color: var(--text-dim);
      font-size: 13px;
    }

    .remember-me input {
      accent-color: var(--primary);
    }

    .forgot-password {
      color: var(--primary);
      text-decoration: none;
      font-size: 13px;
    }

    .auth-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: black;
      border: none;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .auth-btn:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-glow);
    }

    .auth-btn:active {
      transform: scale(0.98);
    }

    .auth-divider {
      display: flex;
      align-items: center;
      gap: 15px;
      color: var(--text-dim);
      font-size: 12px;
      margin: 20px 0;
    }

    .auth-divider-line {
      flex: 1;
      height: 1px;
      background: rgba(255, 255, 255, 0.04);
    }

    .auth-footer {
      text-align: center;
      color: var(--text-dim);
      font-size: 13px;
    }

    .auth-footer a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    .notification {
      position: fixed;
      bottom: 20px;
      left: 16px;
      right: 16px;
      background: rgba(2, 2, 2, 0.98);
      backdrop-filter: blur(20px);
      border: 1px solid var(--primary);
      border-radius: 16px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 1000;
      transform: translateY(200px);
      transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.1);
    }

    .notification.show {
      transform: translateY(0);
    }

    .notification-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: black;
      font-size: 18px;
    }

    .notification-content h4 {
      font-size: 14px;
      margin-bottom: 4px;
    }

    .notification-content p {
      font-size: 12px;
      color: var(--text-dim);
    }

    .notification.error {
      border-color: var(--danger);
    }

    .notification.error .notification-icon {
      background: var(--danger);
    }

    .notification.success {
      border-color: var(--success);
    }

    .notification.success .notification-icon {
      background: var(--success);
    }
  </style>
</head>
<body>

  <!-- ===== BACKGROUND ===== -->
  <div class="gradient-bg"></div>
  <div class="noise"></div>

  <!-- ===== NOTIFICATION ===== -->
  <div class="notification" id="notification">
    <div class="notification-icon">
      <i class="fas fa-info"></i>
    </div>
    <div class="notification-content">
      <h4 id="notificationTitle">Notification</h4>
      <p id="notificationMessage">Message</p>
    </div>
  </div>

  <!-- ===== HEADER ===== -->
  <header class="header">
    <a href="index.html" class="logo">
      <div class="logo-icon">
        <i class="fas fa-bolt"></i>
      </div>
      <div class="logo-text">EarnZone</div>
    </a>
    
    <a href="index.html" class="back-btn">
      <i class="fas fa-arrow-right"></i>
    </a>
  </header>

  <!-- ===== CONTENU PRINCIPAL ===== -->
  <main class="container">
    <div class="auth-card">
      <h1 class="auth-title">
        Bienvenue <span>EarnZone</span>
      </h1>
      <p class="auth-subtitle">
        Connectez-vous pour accéder à vos formations
      </p>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label">Email ou téléphone</label>
          <input type="text" class="form-input" id="identifier" placeholder="exemple@email.com" required>
        </div>

        <div class="form-group">
          <label class="form-label">Mot de passe</label>
          <input type="password" class="form-input" id="password" placeholder="••••••••" required>
        </div>

        <div class="form-options">
          <label class="remember-me">
            <input type="checkbox" id="remember"> Se souvenir de moi
          </label>
          <a href="#" class="forgot-password" onclick="showForgotMessage()">Mot de passe oublié ?</a>
        </div>

        <button type="submit" class="auth-btn" id="loginBtn">
          <i class="fas fa-sign-in-alt"></i>
          Se connecter
        </button>
      </form>

      <div class="auth-divider">
        <div class="auth-divider-line"></div>
        <span>OU</span>
        <div class="auth-divider-line"></div>
      </div>

      <div class="auth-footer">
        Pas encore de compte ? <a href="register.html">S'inscrire</a>
      </div>
    </div>
  </main>

  <script>
    // ============================================
    // VARIABLES
    // ============================================
    let notificationTimer = null;

    // ============================================
    // INITIALISATION
    // ============================================
    document.addEventListener('DOMContentLoaded', function() {
      const currentUser = localStorage.getItem('NX_Money_current_user');
      if (currentUser) {
        window.location.href = 'index.html';
        return;
      }

      const form = document.getElementById('loginForm');
      form.addEventListener('submit', function(e) {
        e.preventDefault();
        login();
      });

      const savedIdentifier = localStorage.getItem('NX_Money_remembered_identifier');
      if (savedIdentifier) {
        document.getElementById('identifier').value = savedIdentifier;
        document.getElementById('remember').checked = true;
      }
    });

    // ============================================
    // CONNEXION
    // ============================================
    function login() {
      const identifier = document.getElementById('identifier').value.trim();
      const password = document.getElementById('password').value;
      const remember = document.getElementById('remember').checked;

      if (!identifier || !password) {
        showNotification('Erreur', 'Veuillez remplir tous les champs', 'error');
        return;
      }

      let foundUser = null;
      let foundUserId = null;

      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key && key.startsWith('NX_Money_user_')) {
          try {
            const userData = JSON.parse(localStorage.getItem(key));
            if (userData.email === identifier || userData.phone === identifier) {
              foundUser = userData;
              foundUserId = key.replace('NX_Money_user_', '');
              break;
            }
          } catch (e) {
            console.error('Erreur lors du parsing', e);
          }
        }
      }

      if (foundUser && foundUser.password === password) {
        localStorage.setItem('NX_Money_current_user', foundUserId);

        if (remember) {
          localStorage.setItem('NX_Money_remembered_identifier', identifier);
        } else {
          localStorage.removeItem('NX_Money_remembered_identifier');
        }

        showNotification('Succès', 'Connexion réussie ! Redirection...', 'success');

        setTimeout(() => {
          window.location.href = 'index.html';
        }, 2000);
      } else {
        showNotification('Erreur', 'Email ou mot de passe incorrect', 'error');
      }
    }

    function showForgotMessage() {
      showNotification('Information', 'Veuillez contacter le support pour réinitialiser votre mot de passe', 'info');
    }

    function showNotification(title, message, type = 'info') {
      const notification = document.getElementById('notification');
      const notificationTitle = document.getElementById('notificationTitle');
      const notificationMessage = document.getElementById('notificationMessage');
      const icon = notification.querySelector('.notification-icon i');

      notificationTitle.textContent = title;
      notificationMessage.textContent = message;

      notification.className = 'notification show';
      if (type === 'error') {
        notification.classList.add('error');
        icon.className = 'fas fa-exclamation-triangle';
      } else if (type === 'success') {
        notification.classList.add('success');
        icon.className = 'fas fa-check-circle';
      } else {
        icon.className = 'fas fa-info';
      }

      if (notificationTimer) {
        clearTimeout(notificationTimer);
      }

      notificationTimer = setTimeout(() => {
        notification.classList.remove('show');
      }, 4000);
    }
  </script>
</body>
</html>
