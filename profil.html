<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Mon Profil - NexFormation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #B76EFF;
      --primary-dark: #8B3FE8;
      --primary-light: #D4A1FF;
      --bg-dark: #030305;
      --text-light: #FFFFFF;
      --text-dim: #8B90A8;
      --card-bg: rgba(12, 12, 22, 0.88);
      --card-border: rgba(183, 110, 255, 0.09);
      --success: #2EE89A;
      --danger: #FF4D6D;
      --warning: #FFD166;
      --glass-bg: rgba(183, 110, 255, 0.05);
      --glass-border: rgba(183, 110, 255, 0.1);
      --transition: all 0.28s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; min-height: 100vh; overflow-x: hidden; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-dark);
      color: var(--text-light);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* GRAIN */
    body::after {
      content: '';
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 9999; pointer-events: none; opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-repeat: repeat; background-size: 128px 128px;
    }

    /* BACKGROUND */
    .gradient-bg {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2;
      background:
        radial-gradient(ellipse 60% 50% at 15% 20%, rgba(139,63,232,0.16) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 85% 75%, rgba(183,110,255,0.1) 0%, transparent 55%),
        linear-gradient(180deg, #030305 0%, #05051A 50%, #030305 100%);
    }

    .orb {
      position: fixed; border-radius: 50%; filter: blur(80px);
      z-index: -1; pointer-events: none;
      animation: orbFloat 8s ease-in-out infinite;
    }
    .orb-1 { width: 300px; height: 300px; background: radial-gradient(circle, rgba(139,63,232,0.14), transparent 70%); top: -100px; left: -100px; }
    .orb-2 { width: 220px; height: 220px; background: radial-gradient(circle, rgba(183,110,255,0.09), transparent 70%); bottom: 20%; right: -70px; animation-delay: -4s; }

    @keyframes orbFloat {
      0%, 100% { transform: translate(0,0) scale(1); }
      33% { transform: translate(18px,-18px) scale(1.04); }
      66% { transform: translate(-14px,14px) scale(0.96); }
    }

    /* HEADER */
    .header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 5%;
      background: rgba(3,3,5,0.92); backdrop-filter: blur(24px);
      position: sticky; top: 0; z-index: 100;
      border-bottom: 1px solid rgba(183,110,255,0.07);
    }

    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo-icon {
      font-size: 28px; font-weight: 900;
      background: linear-gradient(135deg, #D4A1FF, #B76EFF, #8B3FE8);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      animation: nexusGlow 3.5s ease-in-out infinite;
    }
    @keyframes nexusGlow {
      0%,100% { filter: brightness(1); }
      50% { filter: brightness(1.35) drop-shadow(0 0 10px rgba(183,110,255,0.6)); }
    }
    .logo-text { font-size: 17px; font-weight: 700; text-transform: uppercase; }
    .logo-text span { color: var(--primary); }

    .back-btn {
      width: 40px; height: 40px;
      background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-dim); font-size: 16px; text-decoration: none;
      transition: var(--transition);
    }
    .back-btn:hover { color: var(--primary); border-color: rgba(183,110,255,0.25); }
    .back-btn:active { transform: scale(0.93); background: rgba(183,110,255,0.1); }

    /* CONTAINER */
    .container { max-width: 500px; margin: 0 auto; padding: 22px 16px 50px; }

    /* ===== PROFILE HERO CARD ===== */
    .profile-hero {
      background: var(--card-bg); backdrop-filter: blur(20px);
      border: 1px solid var(--card-border); border-radius: 28px;
      padding: 32px 20px 26px; margin-bottom: 16px;
      text-align: center; position: relative; overflow: hidden;
      animation: cardIn 0.5s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .profile-hero::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(183,110,255,0.5), transparent);
    }

    /* Accent glow coin haut-droit */
    .profile-hero::after {
      content: ''; position: absolute; top: -60px; right: -60px;
      width: 160px; height: 160px;
      background: radial-gradient(circle, rgba(183,110,255,0.07), transparent 70%);
      border-radius: 50%; pointer-events: none;
    }

    /* ===== AVATAR ===== */
    .avatar-wrapper {
      position: relative; width: 110px; height: 110px;
      margin: 0 auto 18px; cursor: pointer;
    }

    .avatar-ring {
      position: absolute; inset: -4px; border-radius: 50%;
      background: conic-gradient(var(--primary), var(--primary-dark), var(--primary-light), var(--primary));
      animation: ringRotate 4s linear infinite;
      z-index: 0;
    }

    @keyframes ringRotate { to { transform: rotate(360deg); } }

    .avatar-ring-inner {
      position: absolute; inset: 3px; background: var(--bg-dark); border-radius: 50%; z-index: 1;
    }

    .avatar-img {
      position: absolute; inset: 4px; border-radius: 50%; z-index: 2;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex; align-items: center; justify-content: center;
      font-size: 40px; font-weight: 800; color: white;
      overflow: hidden; transition: var(--transition);
    }

    .avatar-img img {
      width: 100%; height: 100%; object-fit: cover; border-radius: 50%;
    }

    .avatar-overlay {
      position: absolute; inset: 4px; border-radius: 50%; z-index: 3;
      background: rgba(0,0,0,0); display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: background 0.3s ease; gap: 4px;
    }

    .avatar-wrapper:active .avatar-overlay {
      background: rgba(0,0,0,0.55);
    }

    .avatar-overlay-icon {
      color: white; font-size: 20px; opacity: 0;
      transform: translateY(6px); transition: all 0.3s ease;
    }
    .avatar-overlay-text {
      color: white; font-size: 10px; font-weight: 600; opacity: 0;
      transform: translateY(6px); transition: all 0.3s ease 0.05s;
    }

    .avatar-wrapper:active .avatar-overlay-icon,
    .avatar-wrapper:active .avatar-overlay-text {
      opacity: 1; transform: translateY(0);
    }

    /* Camera badge */
    .camera-badge {
      position: absolute; bottom: 2px; right: 2px; z-index: 4;
      width: 30px; height: 30px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      color: white; font-size: 12px;
      border: 2.5px solid var(--bg-dark);
      box-shadow: 0 2px 12px rgba(139,63,232,0.4);
      animation: cameraBounce 2s ease-in-out infinite;
    }

    @keyframes cameraBounce {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    /* inputs cachés gérés inline */

    /* Upload progress */
    .upload-progress {
      position: absolute; inset: 4px; border-radius: 50%; z-index: 5;
      background: rgba(0,0,0,0.7); display: none;
      align-items: center; justify-content: center; flex-direction: column; gap: 6px;
    }
    .upload-progress.active { display: flex; }

    .upload-spinner {
      width: 28px; height: 28px; border: 3px solid rgba(255,255,255,0.2);
      border-top-color: var(--primary); border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .upload-pct { color: white; font-size: 11px; font-weight: 700; }

    /* NAME & INFO */
    .profile-name {
      font-size: 22px; font-weight: 800; margin-bottom: 5px; letter-spacing: -0.2px;
    }

    .profile-info-row {
      display: flex; align-items: center; justify-content: center;
      gap: 7px; color: var(--text-dim); font-size: 13px; margin-bottom: 4px;
    }
    .profile-info-row i { font-size: 11px; color: var(--primary); }

    .member-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(183,110,255,0.07); border: 1px solid rgba(183,110,255,0.14);
      border-radius: 100px; padding: 5px 14px;
      font-size: 12px; color: var(--primary-light); font-weight: 500;
      margin-top: 12px;
    }

    .paid-badge {
      display: none; margin-top: 10px;
      background: rgba(46,232,154,0.08); border: 1px solid rgba(46,232,154,0.25);
      color: var(--success); padding: 7px 18px; border-radius: 100px;
      font-size: 12px; font-weight: 700;
      animation: paidPulse 2.5s ease-in-out infinite;
    }

    @keyframes paidPulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(46,232,154,0); }
      50% { box-shadow: 0 0 0 4px rgba(46,232,154,0.1); }
    }


    /* ===== MENU LIST ===== */
    .section-label {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.1em; color: var(--text-dim);
      margin: 22px 0 10px 4px;
    }

    .menu-list {
      background: var(--card-bg); backdrop-filter: blur(14px);
      border: 1px solid var(--card-border); border-radius: 22px;
      overflow: hidden; margin-bottom: 14px;
      animation: cardIn 0.5s 0.15s cubic-bezier(0.22,1,0.36,1) both;
    }

    .menu-item {
      display: flex; align-items: center; gap: 14px; padding: 16px 18px;
      border-bottom: 1px solid rgba(183,110,255,0.04);
      text-decoration: none; color: var(--text-light);
      transition: var(--transition); position: relative; overflow: hidden;
    }

    .menu-item::after {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px; background: var(--primary); border-radius: 0 2px 2px 0;
      transform: scaleY(0); transition: transform 0.25s ease;
    }

    .menu-item:active { background: rgba(183,110,255,0.05); }
    .menu-item:active::after { transform: scaleY(1); }
    .menu-item:last-child { border-bottom: none; }

    .menu-icon {
      width: 44px; height: 44px; flex-shrink: 0;
      background: rgba(183,110,255,0.08); border: 1px solid rgba(183,110,255,0.1);
      border-radius: 14px; display: flex; align-items: center; justify-content: center;
      font-size: 18px; color: var(--primary); transition: var(--transition);
    }

    .menu-item:active .menu-icon {
      background: rgba(183,110,255,0.15); transform: scale(0.95);
    }

    .menu-content { flex: 1; }
    .menu-title { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
    .menu-subtitle { font-size: 12px; color: var(--text-dim); }
    .menu-arrow { color: rgba(139,144,168,0.4); font-size: 13px; transition: var(--transition); }
    .menu-item:active .menu-arrow { color: var(--primary); transform: translateX(2px); }

    /* ===== LOGOUT BTN ===== */
    .logout-btn {
      width: 100%; padding: 16px; margin-top: 6px;
      background: rgba(255,77,109,0.06); border: 1px solid rgba(255,77,109,0.2);
      border-radius: 18px; color: var(--danger);
      font-size: 15px; font-weight: 700; font-family: 'Inter', sans-serif;
      cursor: pointer; transition: var(--transition);
      display: flex; align-items: center; justify-content: center; gap: 10px;
      animation: cardIn 0.5s 0.25s cubic-bezier(0.22,1,0.36,1) both;
    }

    .logout-btn:active {
      background: rgba(255,77,109,0.14); transform: scale(0.98);
      box-shadow: 0 0 20px rgba(255,77,109,0.15);
    }

    /* ===== NOTIFICATION ===== */

    /* ===== BOTTOM SHEET PHOTO ===== */
    .photo-sheet-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.65); backdrop-filter: blur(10px);
      z-index: 600; display: flex; align-items: flex-end; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .photo-sheet-overlay.open { opacity: 1; pointer-events: all; }

    .photo-sheet {
      background: rgba(8,8,20,0.98); backdrop-filter: blur(24px);
      border: 1px solid rgba(183,110,255,0.12); border-radius: 28px 28px 0 0;
      padding: 18px 20px 44px; width: 100%; max-width: 500px;
      transform: translateY(100%);
      transition: transform 0.42s cubic-bezier(0.34,1.2,0.64,1);
      position: relative;
    }
    .photo-sheet-overlay.open .photo-sheet { transform: translateY(0); }
    .photo-sheet::before {
      content:""; position:absolute; top:0; left:0; right:0; height:1px;
      background:linear-gradient(90deg,transparent,rgba(183,110,255,0.55),transparent);
    }
    .sheet-handle {
      width:40px; height:4px; background:rgba(183,110,255,0.25);
      border-radius:2px; margin:0 auto 22px;
    }
    .sheet-title {
      text-align:center; font-size:11px; font-weight:700;
      color:var(--text-dim); margin-bottom:20px;
      text-transform:uppercase; letter-spacing:0.08em;
    }
    .sheet-options { display:flex; flex-direction:column; gap:10px; }
    .sheet-option {
      display:flex; align-items:center; gap:16px; padding:16px 18px;
      background:rgba(183,110,255,0.05); border:1px solid rgba(183,110,255,0.1);
      border-radius:18px; cursor:pointer; transition:var(--transition);
      font-family:"Inter",sans-serif; width:100%; text-align:left;
    }
    .sheet-option:active { background:rgba(183,110,255,0.12); transform:scale(0.98); }
    .sheet-option-icon {
      width:46px; height:46px; border-radius:14px; flex-shrink:0;
      display:flex; align-items:center; justify-content:center; font-size:20px;
    }
    .sheet-option-icon.camera {
      background:linear-gradient(135deg,rgba(183,110,255,0.2),rgba(139,63,232,0.1));
      border:1px solid rgba(183,110,255,0.2); color:var(--primary);
    }
    .sheet-option-icon.gallery {
      background:linear-gradient(135deg,rgba(46,232,154,0.15),rgba(46,232,154,0.06));
      border:1px solid rgba(46,232,154,0.2); color:var(--success);
    }
    .sheet-option-content { flex:1; }
    .sheet-option-title { font-size:15px; font-weight:700; color:var(--text-light); margin-bottom:2px; }
    .sheet-option-sub { font-size:12px; color:var(--text-dim); }
    .sheet-option-arrow { color:rgba(139,144,168,0.35); font-size:13px; }
    .sheet-cancel {
      width:100%; margin-top:12px; padding:14px;
      background:transparent; border:1px solid rgba(255,255,255,0.07);
      border-radius:16px; color:var(--text-dim);
      font-size:14px; font-family:"Inter",sans-serif; cursor:pointer;
      transition:var(--transition);
    }
    .sheet-cancel:active { background:rgba(255,255,255,0.04); }
    .notification {
      position: fixed; bottom: 20px; left: 16px; right: 16px;
      background: rgba(6,6,18,0.97); backdrop-filter: blur(20px);
      border: 1px solid var(--primary); border-radius: 18px;
      padding: 13px 16px; display: flex; align-items: center; gap: 13px;
      z-index: 1100; transform: translateY(120px);
      transition: transform 0.45s cubic-bezier(0.34,1.56,0.64,1);
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    }
    .notification.show { transform: translateY(0); }

    .notification-icon {
      width: 42px; height: 42px; border-radius: 14px; flex-shrink: 0;
      background: rgba(183,110,255,0.15); border: 1px solid rgba(183,110,255,0.2);
      display: flex; align-items: center; justify-content: center;
      color: var(--primary); font-size: 18px;
    }
    .notification-content h4 { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
    .notification-content p { font-size: 12px; color: var(--text-dim); }
    .notification.error { border-color: var(--danger); }
    .notification.error .notification-icon { background: var(--danger); color: white; border-color: transparent; }
    .notification.success { border-color: var(--success); }
    .notification.success .notification-icon { background: var(--success); color: black; border-color: transparent; }
  </style>
</head>
<body>

  <div class="gradient-bg"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>


  <!-- BOTTOM SHEET CHOIX PHOTO -->
  <div class="photo-sheet-overlay" id="photoSheetOverlay" onclick="closePhotoSheet(event)">
    <div class="photo-sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-title">Photo de profil</div>
      <div class="sheet-options">
        <button class="sheet-option" onclick="pickCamera()">
          <div class="sheet-option-icon camera"><i class="fas fa-camera"></i></div>
          <div class="sheet-option-content">
            <div class="sheet-option-title">Prendre une photo</div>
            <div class="sheet-option-sub">Utiliser ton appareil photo</div>
          </div>
          <div class="sheet-option-arrow"><i class="fas fa-chevron-right"></i></div>
        </button>
        <button class="sheet-option" onclick="pickGallery()">
          <div class="sheet-option-icon gallery"><i class="fas fa-images"></i></div>
          <div class="sheet-option-content">
            <div class="sheet-option-title">Choisir dans la galerie</div>
            <div class="sheet-option-sub">PNG, JPG, WEBP et autres</div>
          </div>
          <div class="sheet-option-arrow"><i class="fas fa-chevron-right"></i></div>
        </button>
      </div>
      <button class="sheet-cancel" onclick="closePhotoSheet()">Annuler</button>
    </div>
  </div>
  <div class="notification" id="notification">
    <div class="notification-icon"><i class="fas fa-info"></i></div>
    <div class="notification-content">
      <h4 id="notificationTitle">Notification</h4>
      <p id="notificationMessage">Message</p>
    </div>
  </div>

  <header class="header">
    <a href="index.html" class="logo">
      <div class="logo-icon">N</div>
      <div class="logo-text">NEX<span>FORMATION</span></div>
    </a>
    <a href="index.html" class="back-btn" title="Accueil">
      <i class="fas fa-home"></i>
    </a>
  </header>

  <main class="container">

    <!-- HERO PROFIL -->
    <div class="profile-hero">


      <!-- Avatar — tap ouvre le menu choix -->
      <div class="avatar-wrapper" onclick="openPhotoSheet()" id="avatarWrapper">
        <div class="avatar-ring"></div>
        <div class="avatar-ring-inner"></div>
        <div class="avatar-img" id="profileAvatar">
          <span id="avatarLetter">U</span>
        </div>
        <div class="avatar-overlay">
          <div class="avatar-overlay-icon"><i class="fas fa-camera"></i></div>
          <div class="avatar-overlay-text">Changer</div>
        </div>
        <div class="upload-progress" id="uploadProgress">
          <div class="upload-spinner"></div>
          <div class="upload-pct" id="uploadPct">...</div>
        </div>
        <div class="camera-badge"><i class="fas fa-camera"></i></div>
      </div>

      <!-- Input appareil photo -->
      <input type="file" id="inputCamera" accept="image/*" capture="environment" style="display:none">
      <!-- Input galerie -->
      <input type="file" id="inputGallery" accept="image/png,image/jpeg,image/jpg,image/webp,image/gif,image/bmp,image/*" style="display:none">
      <h1 class="profile-name" id="profileName">Chargement...</h1>

      <div class="profile-info-row" id="emailRow">
        <i class="fas fa-envelope"></i>
        <span id="profileEmail">—</span>
      </div>
      <div class="profile-info-row" id="phoneRow" style="display:none">
        <i class="fas fa-phone"></i>
        <span id="profilePhone"></span>
      </div>

      <div class="member-badge" id="memberSince" style="display:none">
        <i class="fas fa-calendar-alt"></i>
        <span id="memberSinceText">Membre</span>
      </div>

      <div class="paid-badge" id="paidBadge">
        <i class="fas fa-crown"></i> Accès illimité à vie
      </div>

    </div>

    <!-- MENU -->
    <div class="section-label">Mon espace</div>

    <div class="menu-list">
      <a href="mes-formations.html" class="menu-item">
        <div class="menu-icon"><i class="fas fa-book-open"></i></div>
        <div class="menu-content">
          <div class="menu-title">Mes formations</div>
          <div class="menu-subtitle">Voir mes formations en cours</div>
        </div>
        <div class="menu-arrow"><i class="fas fa-chevron-right"></i></div>
      </a>

      <a href="parametres.html" class="menu-item">
        <div class="menu-icon"><i class="fas fa-cog"></i></div>
        <div class="menu-content">
          <div class="menu-title">Paramètres</div>
          <div class="menu-subtitle">Modifier mon profil</div>
        </div>
        <div class="menu-arrow"><i class="fas fa-chevron-right"></i></div>
      </a>

      <a href="support.html" class="menu-item">
        <div class="menu-icon"><i class="fas fa-headset"></i></div>
        <div class="menu-content">
          <div class="menu-title">Support</div>
          <div class="menu-subtitle">Aide et assistance</div>
        </div>
        <div class="menu-arrow"><i class="fas fa-chevron-right"></i></div>
      </a>
    </div>

    <button class="logout-btn" onclick="window.logout()">
      <i class="fas fa-sign-out-alt"></i>
      Se déconnecter
    </button>

  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signOut, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBWTEWAQjQuDzY26BghtTcqfdyVEmQZXe8",
      authDomain: "nexformation-ebcc0.firebaseapp.com",
      databaseURL: "https://nexformation-ebcc0-default-rtdb.firebaseio.com",
      projectId: "nexformation-ebcc0",
      storageBucket: "nexformation-ebcc0.firebasestorage.app",
      messagingSenderId: "592625968577",
      appId: "1:592625968577:web:53482aea0414983427bb40"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);


    let notificationTimer = null;
    let currentUser = null;

    // ============================================
    // NOTIFICATION
    // ============================================
    function showNotification(title, message, type) {
      type = type || 'info';
      const notification = document.getElementById('notification');
      document.getElementById('notificationTitle').textContent = title;
      document.getElementById('notificationMessage').textContent = message;
      const icon = notification.querySelector('.notification-icon i');
      notification.className = 'notification show';
      if (type === 'error') { notification.classList.add('error'); icon.className = 'fas fa-exclamation-triangle'; }
      else if (type === 'success') { notification.classList.add('success'); icon.className = 'fas fa-check-circle'; }
      else { icon.className = 'fas fa-info'; }
      if (notificationTimer) clearTimeout(notificationTimer);
      notificationTimer = setTimeout(function() { notification.classList.remove('show'); }, 3500);
    }

    // ============================================
    // Sauvegarde en localStorage et dans Firebase Auth photoURL
    // ============================================
    function showAvatarPhoto(dataUrl) {
      const avatarDiv = document.getElementById('profileAvatar');
      avatarDiv.innerHTML = '<img src="' + dataUrl + '" alt="Photo de profil">';
    }

    async function handlePhotoUpload(file) {
      if (!file) return;

      const allowedTypes = ['image/png','image/jpeg','image/jpg','image/webp','image/gif','image/bmp'];
      if (!allowedTypes.includes(file.type) && !file.type.startsWith('image/')) {
        showNotification('Format invalide', 'Utilise PNG, JPG, WEBP ou GIF', 'error');
        return;
      }

      if (file.size > 8 * 1024 * 1024) {
        showNotification('Fichier trop lourd', 'La photo ne doit pas depasser 8 Mo', 'error');
        return;
      }

      // Affiche le loader sur l'avatar
      document.getElementById('uploadProgress').classList.add('active');
      document.getElementById('uploadPct').textContent = '...';

      const reader = new FileReader();
      reader.onload = async function(e) {
        const dataUrl = e.target.result;

        // 1. Affiche immédiatement
        showAvatarPhoto(dataUrl);
        document.getElementById('uploadProgress').classList.remove('active');

        // 2. Sauvegarde localStorage (toujours disponible)
        try {
          localStorage.setItem('NexFormation_avatar_' + currentUser.uid, dataUrl);
        } catch(lsErr) {
          // localStorage plein (image trop grande) — on affiche quand même
          console.warn("localStorage avatar skipped (quota?):", lsErr);
        }

        // 3. Essaie de sauver dans Firebase Auth photoURL (URL data trop grande, on skip)
        // 4. Essaie de sauver URL dans Firestore si possible
        try {
          const userRef = doc(db, "users", currentUser.uid);
          await updateDoc(userRef, { profilePhoto: dataUrl });
        } catch(e) {
          console.warn("Firestore photo skipped:", e.code);
        }

        showNotification('Photo mise a jour', 'Ta photo de profil a ete changee !', 'success');
      };

      reader.onerror = function() {
        document.getElementById('uploadProgress').classList.remove('active');
        showNotification('Erreur', 'Impossible de lire le fichier', 'error');
      };

      reader.readAsDataURL(file);
    }

    // ============================================
    // CHARGER PHOTO DEPUIS localStorage
    // ============================================
    function loadSavedPhoto(uid) {
      const saved = localStorage.getItem('NexFormation_avatar_' + uid);
      if (saved) showAvatarPhoto(saved);
    }

    // ============================================
    // FILL UI
    // ============================================
    function fillUI(name, email, phone, createdAt, courses, fullAccess, profilePhoto) {
      document.getElementById('profileName').textContent = name || 'Utilisateur';
      document.getElementById('avatarLetter').textContent = (name || 'U').charAt(0).toUpperCase();
      document.getElementById('profileEmail').textContent = email || '';

      // Téléphone
      if (phone && phone !== 'Non renseigne' && phone.trim() !== '') {
        document.getElementById('profilePhone').textContent = phone;
        document.getElementById('phoneRow').style.display = 'flex';
      }

      // Date inscription
      if (createdAt) {
        try {
          const date = new Date(createdAt);
          const f = date.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
          document.getElementById('memberSinceText').textContent = 'Membre depuis ' + f;
          document.getElementById('memberSince').style.display = 'inline-flex';
        } catch(e) {}
      }

      // Accès illimité
      if (fullAccess) document.getElementById('paidBadge').style.display = 'inline-flex';

      // Photo (Firestore > localStorage)
      if (profilePhoto) showAvatarPhoto(profilePhoto);

      // Compteur

    }

    // ============================================
    // LOAD USER DATA
    // ============================================
    async function loadUserData() {
      if (!currentUser) return;

      const authName = currentUser.displayName || 'Utilisateur';
      const authEmail = currentUser.email || '';

      // Affichage immédiat avec Auth
      document.getElementById('profileName').textContent = authName;
      document.getElementById('avatarLetter').textContent = authName.charAt(0).toUpperCase();
      document.getElementById('profileEmail').textContent = authEmail;

      // Photo locale sauvegardée
      loadSavedPhoto(currentUser.uid);

      // Compteur localStorage immédiat


      // Puis Firestore pour données complètes
      try {
        const userRef = doc(db, "users", currentUser.uid);
        const userDoc = await getDoc(userRef);
        if (userDoc.exists()) {
          const data = userDoc.data();
          const phone = data.phone || data.telephone || '';
          fillUI(
            data.name || authName,
            data.email || authEmail,
            phone,
            data.createdAt,
            data.courses,
            data.fullAccess,
            data.profilePhoto
          );
        } else {
          // Pas de doc Firestore — on crée un doc minimal
          try {
            await setDoc(doc(db, "users", currentUser.uid), {
              name: authName,
              email: authEmail,
              courses: [],
              fullAccess: false,
              createdAt: new Date().toISOString(),
              uid: currentUser.uid
            });
          } catch(e) {}
          // Met à jour quand même le compteur localStorage
    
        }
      } catch (error) {
        console.warn("Firestore profil non disponible:", error.code);
  
      }
    }


    // ============================================
    // BOTTOM SHEET — PHOTO CHOIX
    // ============================================
    window.openPhotoSheet = function() {
      document.getElementById("photoSheetOverlay").classList.add("open");
    };

    window.closePhotoSheet = function(e) {
      if (!e || e.target === document.getElementById("photoSheetOverlay")) {
        document.getElementById("photoSheetOverlay").classList.remove("open");
      }
    };

    window.pickCamera = function() {
      document.getElementById("photoSheetOverlay").classList.remove("open");
      setTimeout(function() {
        document.getElementById("inputCamera").click();
      }, 200);
    };

    window.pickGallery = function() {
      document.getElementById("photoSheetOverlay").classList.remove("open");
      setTimeout(function() {
        document.getElementById("inputGallery").click();
      }, 200);
    };

    function setupInputListeners() {
      ["inputCamera","inputGallery"].forEach(function(id) {
        document.getElementById(id).addEventListener("change", function(e) {
          const file = e.target.files[0];
          if (file) handlePhotoUpload(file);
          e.target.value = "";
        });
      });
    }
    setupInputListeners();

    // ============================================
    // DÉCONNEXION
    // ============================================
    window.logout = async function() {
      try {
        await signOut(auth);
        localStorage.removeItem('NexFormation_current_user');
        showNotification('Deconnexion', 'A bientot sur NexFormation !', 'success');
        setTimeout(function() { window.location.href = 'login.html'; }, 1500);
      } catch (error) {
        showNotification('Erreur', 'Erreur lors de la deconnexion', 'error');
      }
    };

    // ============================================
    // AUTH
    // ============================================
    onAuthStateChanged(auth, async function(user) {
      if (user) {
        currentUser = user;
        localStorage.setItem('NexFormation_current_user', user.uid);
        await loadUserData();
      } else {
        localStorage.removeItem('NexFormation_current_user');
        window.location.href = 'login.html';
      }
    });
  </script>

</body>
</html>
