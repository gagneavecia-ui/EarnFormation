<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Mon Profil - NX.Money</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  
  <style>
    /* ===== VARIABLES GLOBALES ===== */
    :root {
      --primary: #00ffcc;
      --primary-dark: #00cca3;
      --secondary: #ff4d94;
      --accent: #9d4edd;
      --bg-dark: #000000;
      --bg-medium: #050505;
      --bg-light: #0d0d0d;
      --text-light: #ffffff;
      --text-dim: #6b7a8d;
      --card-bg: rgba(6, 6, 6, 0.97);
      --card-border: rgba(255, 255, 255, 0.04);
      --success: #4cff4c;
      --warning: #ffcc00;
      --danger: #ff4757;
      --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.95);
      --shadow-glow: 0 0 30px rgba(0, 255, 204, 0.12);
      --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1);
      --glass-bg: rgba(255, 255, 255, 0.012);
      --glass-border: rgba(255, 255, 255, 0.025);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #000000;
      color: var(--text-light);
      position: relative;
      font-size: 14px;
      line-height: 1.5;
    }

    .gradient-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      background: radial-gradient(circle at 20% 30%, rgba(0, 255, 204, 0.04) 0%, transparent 40%),
                  radial-gradient(circle at 80% 70%, rgba(157, 78, 221, 0.04) 0%, transparent 40%),
                  radial-gradient(circle at 40% 80%, rgba(255, 77, 148, 0.03) 0%, transparent 40%),
                  #000000;
    }

    .noise {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      opacity: 0.07;
      background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMDAiIGhlaWdodD0iMzAwIj48ZmlsdGVyIGlkPSJmIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iLjc0IiBudW1PY3RhdmVzPSIzIiAvPjwvZmlsdGVyPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbHRlcj0idXJsKCNmKSIgb3BhY2l0eT0iMC4xIiAvPjwvc3ZnPg==');
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 5%;
      background: rgba(0, 0, 0, 0.97);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: black;
      transform: rotate(45deg);
      transition: var(--transition);
    }

    .logo-icon i {
      transform: rotate(-45deg);
    }

    .logo-text {
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--text-light), var(--primary));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
    }

    .back-btn {
      width: 40px;
      height: 40px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-light);
      font-size: 18px;
      cursor: pointer;
      transition: var(--transition);
      text-decoration: none;
    }

    .back-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .container {
      max-width: 500px;
      margin: 0 auto;
      padding: 20px 16px;
    }

    /* ===== PROFIL CARD ===== */
    .profile-header {
      background: rgba(5, 5, 5, 0.98);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 24px;
      padding: 30px 20px;
      margin-bottom: 20px;
      text-align: center;
      position: relative;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.8);
    }

    .profile-header::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0, 255, 204, 0.4), rgba(157, 78, 221, 0.4), transparent);
    }

    .profile-avatar-large {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: 700;
      color: black;
      margin: 0 auto 15px;
      box-shadow: 0 0 0 3px rgba(0, 0, 0, 1), 0 0 0 5px rgba(0, 255, 204, 0.2), 0 0 20px rgba(0, 255, 204, 0.15);
    }

    .profile-name {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .profile-email {
      color: var(--text-dim);
      font-size: 14px;
      margin-bottom: 5px;
    }

    .profile-phone {
      color: var(--text-dim);
      font-size: 14px;
      margin-bottom: 5px;
    }

    .member-since {
      color: var(--text-dim);
      font-size: 12px;
      margin-top: 10px;
    }

    .access-badge {
      display: inline-block;
      background: rgba(76, 255, 76, 0.08);
      border: 1px solid rgba(76, 255, 76, 0.3);
      color: var(--success);
      padding: 8px 16px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 600;
      margin-top: 15px;
    }

    .access-badge i {
      margin-right: 5px;
    }

    /* ===== STATISTIQUES ===== */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: rgba(5, 5, 5, 0.98);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 16px;
      padding: 16px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0, 255, 204, 0.3), transparent);
    }

    .stat-value {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px;
      color: var(--primary);
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-dim);
    }

    /* ===== MENU ===== */
    .menu-list {
      background: rgba(5, 5, 5, 0.98);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 20px;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.6);
    }

    .menu-item {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.035);
      text-decoration: none;
      color: var(--text-light);
      transition: var(--transition);
    }

    .menu-item:last-child {
      border-bottom: none;
    }

    .menu-item:hover {
      background: rgba(0, 255, 204, 0.03);
    }

    .menu-icon {
      width: 40px;
      height: 40px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: var(--primary);
    }

    .menu-content {
      flex: 1;
    }

    .menu-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .menu-subtitle {
      font-size: 12px;
      color: var(--text-dim);
    }

    .menu-arrow {
      color: var(--text-dim);
      font-size: 14px;
    }

    /* ===== BOUTON DÉCONNEXION ===== */
    .logout-btn {
      width: 100%;
      padding: 16px;
      background: rgba(255, 77, 148, 0.06);
      border: 1px solid rgba(255, 77, 148, 0.25);
      border-radius: 16px;
      color: var(--secondary);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .logout-btn:hover {
      background: rgba(255, 77, 148, 0.12);
      transform: translateY(-2px);
    }

    .logout-btn:active {
      transform: scale(0.98);
    }

    /* ===== NOTIFICATION ===== */
    .notification {
      position: fixed;
      bottom: 20px;
      left: 16px;
      right: 16px;
      background: rgba(2, 2, 2, 0.98);
      backdrop-filter: blur(20px);
      border: 1px solid var(--primary);
      border-radius: 16px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 1000;
      transform: translateY(200px);
      transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.1);
    }

    .notification.show {
      transform: translateY(0);
    }

    .notification-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: black;
      font-size: 18px;
    }

    .notification-content h4 {
      font-size: 14px;
      margin-bottom: 4px;
    }

    .notification-content p {
      font-size: 12px;
      color: var(--text-dim);
    }

    .notification.error {
      border-color: var(--danger);
    }

    .notification.error .notification-icon {
      background: var(--danger);
    }

    .notification.success {
      border-color: var(--success);
    }

    .notification.success .notification-icon {
      background: var(--success);
    }
  </style>
</head>
<body>

  <!-- ===== SCRIPT DE PROTECTION ===== -->
  <script>
    (function() {
      let userId = localStorage.getItem('NX_Money_current_user');
      if (!userId) {
        userId = localStorage.getItem('earnzone_current_user');
      }
      if (!userId) {
        window.location.href = 'login.html';
        return;
      }
    })();
  </script>

  <!-- ===== BACKGROUND ===== -->
  <div class="gradient-bg"></div>
  <div class="noise"></div>

  <!-- ===== NOTIFICATION ===== -->
  <div class="notification" id="notification">
    <div class="notification-icon">
      <i class="fas fa-info"></i>
    </div>
    <div class="notification-content">
      <h4 id="notificationTitle">Notification</h4>
      <p id="notificationMessage">Message</p>
    </div>
  </div>

  <!-- ===== HEADER ===== -->
  <header class="header">
    <a href="index.html" class="logo">
      <div class="logo-icon">
        <i class="fas fa-bolt"></i>
      </div>
      <div class="logo-text">EarnZone</div>
    </a>
    
    <a href="index.html" class="back-btn">
      <i class="fas fa-home"></i>
    </a>
  </header>

  <!-- ===== CONTENU PRINCIPAL ===== -->
  <main class="container">
    
    <!-- ===== PROFIL ===== -->
    <div class="profile-header">
      <div class="profile-avatar-large" id="profileAvatar">U</div>
      <h1 class="profile-name" id="profileName">Chargement...</h1>
      <p class="profile-email" id="profileEmail">chargement...</p>
      <p class="profile-phone" id="profilePhone"></p>
      <p class="member-since" id="memberSince"></p>
      
      <div id="paidBadge" style="display: none;">
        <div class="access-badge">
          <i class="fas fa-crown"></i> Accès illimité à vie
        </div>
      </div>
    </div>

    <!-- ===== STATISTIQUES ===== -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="coursesCompleted">0</div>
        <div class="stat-label">Formations suivies</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="certificates">0</div>
        <div class="stat-label">Certificats</div>
      </div>
    </div>

    <!-- ===== MENU ===== -->
    <div class="menu-list">
      <a href="mes-formations.html" class="menu-item">
        <div class="menu-icon">
          <i class="fas fa-book-open"></i>
        </div>
        <div class="menu-content">
          <div class="menu-title">Mes formations</div>
          <div class="menu-subtitle">Voir mes formations en cours</div>
        </div>
        <div class="menu-arrow">
          <i class="fas fa-chevron-right"></i>
        </div>
      </a>

      <a href="certificats.html" class="menu-item">
        <div class="menu-icon">
          <i class="fas fa-certificate"></i>
        </div>
        <div class="menu-content">
          <div class="menu-title">Mes certificats</div>
          <div class="menu-subtitle">Télécharger mes certificats</div>
        </div>
        <div class="menu-arrow">
          <i class="fas fa-chevron-right"></i>
        </div>
      </a>

      <a href="parametres.html" class="menu-item">
        <div class="menu-icon">
          <i class="fas fa-cog"></i>
        </div>
        <div class="menu-content">
          <div class="menu-title">Paramètres</div>
          <div class="menu-subtitle">Modifier mon profil</div>
        </div>
        <div class="menu-arrow">
          <i class="fas fa-chevron-right"></i>
        </div>
      </a>

      <a href="support.html" class="menu-item">
        <div class="menu-icon">
          <i class="fas fa-headset"></i>
        </div>
        <div class="menu-content">
          <div class="menu-title">Support</div>
          <div class="menu-subtitle">Aide et assistance</div>
        </div>
        <div class="menu-arrow">
          <i class="fas fa-chevron-right"></i>
        </div>
      </a>
    </div>

    <!-- ===== BOUTON DÉCONNEXION ===== -->
    <button class="logout-btn" onclick="logout()">
      <i class="fas fa-sign-out-alt"></i>
      Se déconnecter
    </button>

  </main>

  <script>
    // ============================================
    // VARIABLES
    // ============================================
    let userData = null;
    let userId = null;
    let notificationTimer = null;

    // ============================================
    // INITIALISATION
    // ============================================
    function init() {
      loadUserData();
    }

    // ============================================
    // CHARGER LES DONNÉES UTILISATEUR
    // ============================================
    function loadUserData() {
      userId = localStorage.getItem('NX_Money_current_user');
      if (!userId) {
        userId = localStorage.getItem('earnzone_current_user');
      }
      
      if (!userId) {
        window.location.href = 'login.html';
        return;
      }
      
      let userDataStr = localStorage.getItem(`NX_Money_user_${userId}`);
      if (!userDataStr) {
        userDataStr = localStorage.getItem(`earnzone_user_${userId}`);
      }
      
      if (userDataStr) {
        userData = JSON.parse(userDataStr);
        
        document.getElementById('profileName').textContent = userData.name || 'Utilisateur';
        document.getElementById('profileEmail').textContent = userData.email || 'email@example.com';
        document.getElementById('profileAvatar').textContent = (userData.name || 'U').charAt(0).toUpperCase();
        
        if (userData.phone) {
          document.getElementById('profilePhone').innerHTML = '<i class="fas fa-phone"></i> ' + userData.phone;
        }
        
        if (userData.createdAt) {
          const date = new Date(userData.createdAt);
          const formattedDate = date.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
          document.getElementById('memberSince').innerHTML = '<i class="fas fa-calendar-alt"></i> Membre depuis ' + formattedDate;
        }
        
        const coursesCount = userData.courses?.length || 0;
        document.getElementById('coursesCompleted').textContent = coursesCount;
        document.getElementById('certificates').textContent = coursesCount;
        
        if (userData.fullAccess) {
          document.getElementById('paidBadge').style.display = 'block';
        }
      } else {
        document.getElementById('profileName').textContent = 'Utilisateur';
        document.getElementById('profileEmail').textContent = 'Non disponible';
      }
    }

    // ============================================
    // DÉCONNEXION
    // ============================================
    function logout() {
      localStorage.removeItem('NX_Money_current_user');
      localStorage.removeItem('earnzone_current_user');
      showNotification('Déconnexion', 'À bientôt !', 'success');
      setTimeout(() => {
        window.location.href = 'login.html';
      }, 1500);
    }

    // ============================================
    // AFFICHER NOTIFICATION
    // ============================================
    function showNotification(title, message, type = 'info') {
      const notification = document.getElementById('notification');
      const notificationTitle = document.getElementById('notificationTitle');
      const notificationMessage = document.getElementById('notificationMessage');
      const icon = notification.querySelector('.notification-icon i');

      notificationTitle.textContent = title;
      notificationMessage.textContent = message;

      notification.className = 'notification show';
      if (type === 'error') {
        notification.classList.add('error');
        icon.className = 'fas fa-exclamation-triangle';
      } else if (type === 'success') {
        notification.classList.add('success');
        icon.className = 'fas fa-check-circle';
      } else {
        icon.className = 'fas fa-info';
      }

      if (notificationTimer) {
        clearTimeout(notificationTimer);
      }

      notificationTimer = setTimeout(() => {
        notification.classList.remove('show');
      }, 3000);
    }

    // ============================================
    // DÉMARRER
    // ============================================
    document.addEventListener('DOMContentLoaded', init);
  </script>

</body>
</html>
